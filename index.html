<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>マインスイーパー</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
}

#board {
  display: grid;
  gap: 2px;
  justify-content: center;
  margin-top: 20px;
}

.cell {
  width: 30px;
  height: 30px;
  background: lightgray;
  border: 1px solid #999;
  font-size: 14px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.open {
  background: white;
}

.mine {
  background: red;
}

.hidden {
  display: none;
}

.disabled {
  pointer-events: none;
}
</style>
</head>

<body>

<div id="titleScreen">
  <h1>マインスイーパー</h1>
  <button onclick="startGame(9,10)">初級</button>
  <button onclick="startGame(16,40)">中級</button>
  <button onclick="startGame(30,99)">上級</button>
</div>

<div id="gameScreen" class="hidden">
  <h2 id="mode"></h2>
  <div id="board"></div>
  <p id="message"></p>
</div>

<script>
let size, mineCount;
let cells = [];
let mines = [];
let openedCount = 0;
let gameActive = false;
let firstClick = true;

const board = document.getElementById("board");
const message = document.getElementById("message");
const titleScreen = document.getElementById("titleScreen");
const gameScreen = document.getElementById("gameScreen");
const modeText = document.getElementById("mode");

function startGame(s, m) {
  size = s;
  mineCount = m;

  titleScreen.classList.add("hidden");
  gameScreen.classList.remove("hidden");

  modeText.textContent = `${s}×${s} / 地雷${m}`;
  init();
}

function init() {
  cells = [];
  mines = [];
  openedCount = 0;
  gameActive = true;
  firstClick = true;

  board.classList.remove("disabled");
  board.innerHTML = "";
  message.textContent = "";

  board.style.gridTemplateColumns = `repeat(${size}, 30px)`;

  for (let i = 0; i < size * size; i++) {
    const cell = document.createElement("div");
    cell.classList.add("cell");
    cell.dataset.index = i;

    cell.addEventListener("click", leftClick);
    cell.addEventListener("contextmenu", e => {
      e.preventDefault();
      rightClick(e);
    });

    board.appendChild(cell);
    cells.push(cell);
  }
}

// 初手後に地雷配置
function placeMines(safeIndex) {
  while (mines.length < mineCount) {
    let rand = Math.floor(Math.random() * size * size);

    // 初手とその周囲は安全
    if (rand === safeIndex) continue;
    if (getNeighbors(safeIndex).includes(rand)) continue;

    if (!mines.includes(rand)) mines.push(rand);
  }
}

function leftClick(e) {
  if (!gameActive) return;

  const index = Number(e.target.dataset.index);

  if (e.target.classList.contains("open")) return;
  if (e.target.textContent === "🚩") return;

  if (firstClick) {
    placeMines(index);
    firstClick = false;
  }

  if (mines.includes(index)) {
    revealMines();
    message.textContent = "ゲームオーバー！";
    gameActive = false;
    board.classList.add("disabled");

    setTimeout(() => {
      gameScreen.classList.add("hidden");
      titleScreen.classList.remove("hidden");
    }, 3000);

    return;
  }

  openCell(index);

  if (openedCount === size * size - mineCount) {
    message.textContent = "クリア！";
    gameActive = false;
    board.classList.add("disabled");

    setTimeout(() => {
      gameScreen.classList.add("hidden");
      titleScreen.classList.remove("hidden");
    }, 3000);
  }
}

function rightClick(e) {
  if (!gameActive) return;

  if (e.target.classList.contains("open")) return;

  e.target.textContent =
    e.target.textContent === "🚩" ? "" : "🚩";
}

function openCell(index) {
  const cell = cells[index];
  if (!cell || cell.classList.contains("open")) return;

  cell.classList.add("open");
  openedCount++;

  const count = countMines(index);

  if (count > 0) {
    cell.textContent = count;
  } else {
    getNeighbors(index).forEach(n => openCell(n));
  }
}

function countMines(index) {
  return getNeighbors(index).filter(n => mines.includes(n)).length;
}

function getNeighbors(index) {
  const neighbors = [];
  const row = Math.floor(index / size);
  const col = index % size;

  for (let r = -1; r <= 1; r++) {
    for (let c = -1; c <= 1; c++) {
      if (r === 0 && c === 0) continue;

      const nr = row + r;
      const nc = col + c;

      if (nr >= 0 && nr < size && nc >= 0 && nc < size) {
        neighbors.push(nr * size + nc);
      }
    }
  }
  return neighbors;
}

function revealMines() {
  mines.forEach(i => {
    cells[i].classList.add("mine");
    cells[i].textContent = "💣";
  });
}
</script>

</body>
</html>
