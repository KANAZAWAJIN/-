<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>マインスイーパー</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
}

#titleScreen {
  margin-top: 100px;
}

#board {
  display: grid;
  grid-template-columns: repeat(9, 40px);
  gap: 2px;
  justify-content: center;
  margin-top: 20px;
}

.cell {
  width: 40px;
  height: 40px;
  background: lightgray;
  border: 1px solid #999;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.open {
  background: white;
  cursor: default;
}

.mine {
  background: red;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<!-- タイトル画面 -->
<div id="titleScreen">
  <h1>マインスイーパー</h1>
  <button onclick="startGame()">スタート</button>
</div>

<!-- ゲーム画面 -->
<div id="gameScreen" class="hidden">
  <h1>マインスイーパー</h1>
  <div id="board"></div>
  <p id="message"></p>
</div>

<script>
const size = 9;
const mineCount = 10;

let cells = [];
let mines = [];
let openedCount = 0;
let gameActive = false;

const board = document.getElementById("board");
const message = document.getElementById("message");
const titleScreen = document.getElementById("titleScreen");
const gameScreen = document.getElementById("gameScreen");

// ゲーム開始
function startGame() {
  titleScreen.classList.add("hidden");
  gameScreen.classList.remove("hidden");
  init();
}

// 初期化
function init() {
  cells = [];
  mines = [];
  openedCount = 0;
  gameActive = true;

  board.innerHTML = "";
  message.textContent = "";

  while (mines.length < mineCount) {
    let rand = Math.floor(Math.random() * size * size);
    if (!mines.includes(rand)) mines.push(rand);
  }

  for (let i = 0; i < size * size; i++) {
    const cell = document.createElement("div");
    cell.classList.add("cell");
    cell.dataset.index = i;

    cell.addEventListener("click", leftClick);

    cell.addEventListener("contextmenu", (e) => {
      e.preventDefault();
      rightClick(e);
    });

    board.appendChild(cell);
    cells.push(cell);
  }
}

// 左クリック
function leftClick(e) {
  if (!gameActive) return;

  const index = Number(e.target.dataset.index);

  if (e.target.classList.contains("open")) return;
  if (e.target.textContent === "🚩") return;

  if (mines.includes(index)) {
    revealMines();
    message.textContent = "ゲームオーバー！";
    gameActive = false;

    // 3秒後にタイトルへ
    setTimeout(() => {
      gameScreen.classList.add("hidden");
      titleScreen.classList.remove("hidden");
    }, 3000);

    return;
  }

  openCell(index);

  if (openedCount === size * size - mineCount) {
    message.textContent = "クリア！";
    gameActive = false;

    setTimeout(() => {
      gameScreen.classList.add("hidden");
      titleScreen.classList.remove("hidden");
    }, 3000);
  }
}

// 右クリック
function rightClick(e) {
  if (!gameActive) return;

  if (e.target.classList.contains("open")) return;

  if (e.target.textContent === "🚩") {
    e.target.textContent = "";
  } else {
    e.target.textContent = "🚩";
  }
}

// セルを開く
function openCell(index) {
  const cell = cells[index];
  if (!cell || cell.classList.contains("open")) return;

  cell.classList.add("open");
  openedCount++;

  const count = countMines(index);

  if (count > 0) {
    cell.textContent = count;
  } else {
    getNeighbors(index).forEach(n => openCell(n));
  }
}

// 周囲の地雷数
function countMines(index) {
  return getNeighbors(index).filter(n => mines.includes(n)).length;
}

// 隣接マス
function getNeighbors(index) {
  const neighbors = [];
  const row = Math.floor(index / size);
  const col = index % size;

  for (let r = -1; r <= 1; r++) {
    for (let c = -1; c <= 1; c++) {
      if (r === 0 && c === 0) continue;

      const nr = row + r;
      const nc = col + c;

      if (nr >= 0 && nr < size && nc >= 0 && nc < size) {
        neighbors.push(nr * size + nc);
      }
    }
  }
  return neighbors;
}

// 地雷表示
function revealMines() {
  mines.forEach(i => {
    cells[i].classList.add("mine");
    cells[i].textContent = "💣";
  });
}
</script>

</body>
</html>
