<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>マインスイーパー</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
}

#titleScreen {
  margin-top: 100px;
}

#board {
  display: grid;
  gap: 2px;
  justify-content: center;
  margin-top: 20px;
}

.cell {
  width: 25px;
  height: 25px;
  background: lightgray;
  border: 1px solid #999;
  font-size: 13px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.open {
  background: white;
}

.mine {
  background: red;
}

.hidden {
  display: none;
}

.disabled {
  pointer-events: none;
}
</style>
</head>

<body>

<!-- タイトル -->
<div id="titleScreen">
  <h1>マインスイーパー（上級）</h1>
  <button onclick="startGame()">スタート</button>
</div>

<!-- ゲーム -->
<div id="gameScreen" class="hidden">
  <h2>16×30 / 地雷99</h2>
  <p>残り地雷：<span id="mineCounter">99</span></p>
  <div id="board"></div>
  <p id="message"></p>
</div>

<script>
const rows = 16;
const cols = 30;
const mineCount = 99;

let cells = [];
let mines = [];
let openedCount = 0;
let gameActive = false;
let firstClick = true;
let flags = 0;

const board = document.getElementById("board");
const message = document.getElementById("message");
const mineCounter = document.getElementById("mineCounter");
const titleScreen = document.getElementById("titleScreen");
const gameScreen = document.getElementById("gameScreen");

function startGame() {
  titleScreen.classList.add("hidden");
  gameScreen.classList.remove("hidden");
  init();
}

function init() {
  cells = [];
  mines = [];
  openedCount = 0;
  flags = 0;
  gameActive = true;
  firstClick = true;

  board.classList.remove("disabled");
  board.innerHTML = "";
  message.textContent = "";
  mineCounter.textContent = mineCount;

  board.style.gridTemplateColumns = `repeat(${cols}, 25px)`;

  for (let i = 0; i < rows * cols; i++) {
    const cell = document.createElement("div");
    cell.classList.add("cell");
    cell.dataset.index = i;

    cell.addEventListener("click", leftClick);
    cell.addEventListener("contextmenu", e => {
      e.preventDefault();
      rightClick(e);
    });

    board.appendChild(cell);
    cells.push(cell);
  }
}

// 初手安全
function placeMines(safeIndex) {
  while (mines.length < mineCount) {
    let rand = Math.floor(Math.random() * rows * cols);

    if (rand === safeIndex) continue;
    if (getNeighbors(safeIndex).includes(rand)) continue;

    if (!mines.includes(rand)) mines.push(rand);
  }
}

function leftClick(e) {
  if (!gameActive) return;

  const index = Number(e.target.dataset.index);

  if (e.target.classList.contains("open")) return;
  if (e.target.textContent === "🚩") return;

  if (firstClick) {
    placeMines(index);
    firstClick = false;
  }

  if (mines.includes(index)) {
    revealMines();
    message.textContent = "ゲームオーバー！";
    gameActive = false;
    board.classList.add("disabled");

    setTimeout(() => {
      gameScreen.classList.add("hidden");
      titleScreen.classList.remove("hidden");
    }, 3000);

    return;
  }

  openCell(index);

  if (openedCount === rows * cols - mineCount) {
    message.textContent = "クリア！";
    gameActive = false;
    board.classList.add("disabled");

    setTimeout(() => {
      gameScreen.classList.add("hidden");
      titleScreen.classList.remove("hidden");
    }, 3000);
  }
}

function rightClick(e) {
  if (!gameActive) return;

  if (e.target.classList.contains("open")) return;

  if (e.target.textContent === "🚩") {
    e.target.textContent = "";
    flags--;
  } else {
    e.target.textContent = "🚩";
    flags++;
  }

  // 残り地雷表示更新
  mineCounter.textContent = mineCount - flags;
}

function openCell(index) {
  const cell = cells[index];
  if (!cell || cell.classList.contains("open")) return;

  cell.classList.add("open");
  openedCount++;

  const count = countMines(index);

  if (count > 0) {
    cell.textContent = count;
  } else {
    getNeighbors(index).forEach(n => openCell(n));
  }
}

function countMines(index) {
  return getNeighbors(index).filter(n => mines.includes(n)).length;
}

function getNeighbors(index) {
  const neighbors = [];
  const row = Math.floor(index / cols);
  const col = index % cols;

  for (let r = -1; r <= 1; r++) {
    for (let c = -1; c <= 1; c++) {
      if (r === 0 && c === 0) continue;

      const nr = row + r;
      const nc = col + c;

      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
        neighbors.push(nr * cols + nc);
      }
    }
  }
  return neighbors;
}

function revealMines() {
  mines.forEach(i => {
    cells[i].classList.add("mine");
    cells[i].textContent = "💣";
  });
}
</script>

</body>
</html>
